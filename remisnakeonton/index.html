<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
    <meta name="theme-color" content="#050510" />
    <title>Snake.io — TON</title>
    <meta name="description" content="Competitive Snake.io game on TON blockchain — earn coins, connect wallet, compete!" />
    <!-- Telegram Mini App SDK (REQUIRED for Telegram integration) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Telegram Mini Apps Analytics SDK (Optional - loaded with error handling) -->
    <script>
      // Load analytics with error handling to prevent blocking
      try {
        const analyticsScript = document.createElement('script');
        analyticsScript.src = 'https://telegram.org/js/telegram-analytics.js';
        analyticsScript.async = true;
        analyticsScript.onerror = () => console.log('[Analytics] Failed to load, continuing without analytics');
        document.head.appendChild(analyticsScript);
      } catch (e) {
        console.log('[Analytics] Not available in this context');
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              neon: {
                blue: '#00f3ff',
                pink: '#ff00ff',
                green: '#00ff9d',
                yellow: '#ffe600',
                purple: '#bd00ff',
              },
              dark: {
                bg: '#050510',
                grid: '#0a0a20'
              }
            },
            fontFamily: {
              sans: ['Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
              mono: ['Consolas', 'Monaco', 'Courier New', 'monospace'],
            },
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #050510;
        color: white;
        overflow: hidden;
        touch-action: none; /* Prevent pull-to-refresh on mobile */
      }
      /* Hide scrollbars */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
      .glass-panel {
        background: rgba(10, 10, 30, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .text-shadow-neon {
        text-shadow: 0 0 5px currentColor, 0 0 10px currentColor;
      }
    </style>

}
</script>
